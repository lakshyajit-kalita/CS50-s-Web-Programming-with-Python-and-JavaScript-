<!-- this is for Lists-->
 <!DOCTYPE html>
<html lang="eg">
    <head>
        <title>List in Html</title>
    </head>
    <body>
        An unorderd List:
        <ul>
            <li>One Item</li>
            <li>Another Item</li>
            <li>Yet another Item</li>
        </ul>
        An orderd List:
        <ol>
            <li>First Item</li>
            <li>Second Item</li>
            <li>Third Item</li>
        </ol>
    </body>
</html>
