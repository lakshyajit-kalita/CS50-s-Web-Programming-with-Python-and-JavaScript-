<!-- this is for id-->
 <!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        #foo {
            color: blue;
        }
        #boo{
            color:green;
        }
        #doo{
            color:red;
        }

        .baz {
            color: orange;
        }
    </style>
</head>
<body>
    <h1 id="foo">Heading 1</h1>
    <h1 id="doo">Heading 2</h1>
    <h1 id="boo">Heading 3</h1>
    -------------------------------
    <h2 class="baz">heading 1</h2>
    <h2 class="baz">heading 2</h2>
    <h2>heading 3</h2>
</body>
</html>

<!-- for 'id' we have to use # inside the style tag..
    and for 'class' we use . inside the style tag.-->
